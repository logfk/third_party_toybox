<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OHOS Toybox Test Report</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#0f0f23;color:#e0e0e0;line-height:1.6}
.container{max-width:960px;margin:0 auto;padding:20px}
@media(max-width:600px){.container{padding:10px}}
header{text-align:center;padding:30px 0;border-bottom:1px solid #2a2a4e;margin-bottom:30px}
header h1{font-size:1.8em;color:#e8e8ff;margin-bottom:6px;font-weight:700}
header .sub{color:#888;font-size:0.9em}

/* Input area */
.input-area{background:#161638;border-radius:12px;padding:20px;margin-bottom:24px}
.input-area textarea{width:100%;min-height:200px;background:#0a0a1e;color:#e0e0e0;border:1px solid #2a2a4e;border-radius:8px;padding:14px;font-family:'Consolas','Courier New',monospace;font-size:0.85em;resize:vertical;outline:none;transition:border-color .3s}
.input-area textarea:focus{border-color:#4e4e8e}
.input-area .btn-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.btn{background:#2e2e5e;color:#e0e0ff;border:none;border-radius:6px;padding:10px 24px;font-size:0.95em;cursor:pointer;transition:background .2s}
.btn:hover{background:#3e3e7e}
.btn.primary{background:#4a4a8a;font-weight:600}
.btn.primary:hover{background:#5a5aaa}
#output{display:none}
.error-msg{background:#2b0d0d;color:#f44336;padding:14px;border-radius:8px;margin-bottom:20px}
.hidden{display:none!important}

/* Summary cards */
.summary{background:#161638;border-radius:12px;padding:24px;margin-bottom:24px}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:600px){.summary-grid{grid-template-columns:repeat(2,1fr)}}
.summary-item{border-radius:8px;padding:16px 12px;text-align:center}
.summary-item.total{background:#1e1e4a}
.summary-item.pass{background:#0d2b1a}
.summary-item.fail{background:#2b0d0d}
.summary-item.skip{background:#2b2b0d}
.summary-item .num{font-size:2em;font-weight:700;line-height:1.2}
.summary-item.total .num{color:#fff}
.summary-item.pass .num{color:#4caf50}
.summary-item.fail .num{color:#f44336}
.summary-item.skip .num{color:#ff9800}
.summary-item .lbl{font-size:0.8em;color:#999;margin-top:4px}
.progress-bar{display:flex;height:14px;border-radius:7px;background:#2a2a4e;overflow:hidden;margin-top:16px}
.progress-segment{height:100%;transition:width .6s ease}
.progress-pass{background:#4caf50}
.progress-fail{background:#f44336}
.progress-skip{background:#ff9800}
.status-banner{text-align:center;padding:12px;border-radius:8px;margin:16px 0 0;font-size:1.05em;font-weight:600}
.status-banner.success{background:#0d2b1a;color:#4caf50}
.status-banner.has-fail{background:#2b0d0d;color:#f44336}

/* Board support */
.section{background:#161638;border-radius:12px;padding:24px;margin-bottom:20px}
.section-title{font-size:1.15em;color:#e8e8ff;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #2a2a4e}
.board-list{list-style:none;display:flex;flex-wrap:wrap;gap:8px;max-height:110px;overflow-y:auto;padding-right:4px}
.board-list::-webkit-scrollbar{width:6px}
.board-list::-webkit-scrollbar-thumb{background:#3a3a5e;border-radius:3px}
.board-list li{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:4px;font-size:0.85em;font-family:'Consolas','Courier New',monospace}
.board-list li.ok{background:#0d2b1a;color:#4caf50;border:1px solid #1a5a2a}
.board-list li.no{background:#2b0d0d;color:#f44336;border:1px solid #5a1a1a}
.badge-ok,.badge-no{font-weight:bold;font-size:0.9em}

/* Navigation bar */
.nav-bar{background:#161638;border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.nav-bar .back-btn{background:#2e2e5e;color:#e0e0ff;border:none;border-radius:6px;padding:8px 16px;font-size:0.9em;cursor:pointer;transition:background .2s;white-space:nowrap}
.nav-bar .back-btn:hover{background:#3e3e7e}
.nav-bar .breadcrumb{color:#888;font-size:0.9em}
.nav-bar .breadcrumb span{color:#e0e0ff;font-weight:600}
.nav-bar .breadcrumb .sep{margin:0 8px;color:#555}

/* Command list grid */
.command-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
@media(max-width:600px){.command-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.command-grid{grid-template-columns:1fr}}
.command-card{background:#1a1a3e;border-radius:10px;padding:16px;cursor:pointer;transition:background .2s,transform .1s;border:1px solid #2a2a4e;position:relative}
.command-card:hover{background:#22224e;transform:translateY(-2px);border-color:#4e4e8e}
.command-card .cmd-name{font-weight:600;color:#e8e8ff;margin-bottom:8px;font-size:1em}
.command-card .cmd-stats{display:flex;gap:8px;flex-wrap:wrap}
.command-card .stat-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font-size:0.75em;font-weight:600}
.command-card .stat-badge.pass{background:#0d2b1a;color:#4caf50;border:1px solid #1a5a2a}
.command-card .stat-badge.fail{background:#2b0d0d;color:#f44336;border:1px solid #5a1a1a}
.command-card .stat-badge.skip{background:#2b2b0d;color:#ff9800;border:1px solid #5a5a1a}
.command-card .stat-badge.total{background:#1e1e4a;color:#aaa;border:1px solid #3a3a5e}

/* Command detail header */
.cmd-header{background:#161638;border-radius:12px;padding:24px;margin-bottom:20px}
.cmd-header .cmd-title{font-size:1.3em;color:#e8e8ff;font-weight:700;margin-bottom:8px}
.cmd-header .cmd-name-monospace{font-family:'Consolas','Courier New',monospace;color:#888;font-size:0.9em}
.cmd-header .cmd-summary-stats{display:flex;gap:12px;margin-top:12px}
.cmd-header .cmd-summary-stats .stat{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:4px;font-size:0.85em}
.cmd-header .cmd-summary-stats .stat.pass{background:#0d2b1a;color:#4caf50}
.cmd-header .cmd-summary-stats .stat.fail{background:#2b0d0d;color:#f44336}
.cmd-header .cmd-summary-stats .stat.skip{background:#2b2b0d;color:#ff9800}

/* Test case list */
.test-list{display:flex;flex-direction:column;gap:8px}
.test-row{background:#161638;border-radius:10px;padding:14px 18px;font-size:0.9em;display:flex;align-items:flex-start;gap:12px;border-left:3px solid transparent;transition:background .2s}
.test-row:hover{background:#1a1a3e}
.test-row.pass{border-left-color:#4caf50}
.test-row.fail{border-left-color:#f44336;background:#1e1010}
.test-row.fail:hover{background:#2a1515}
.test-row.skip{border-left-color:#ff9800;background:#1e1e10}
.test-row.skip:hover{background:#2a2a15}
.test-row .badge{flex-shrink:0;display:inline-block;padding:2px 8px;border-radius:3px;font-size:0.75em;font-weight:bold;text-transform:uppercase;min-width:44px;text-align:center}
.test-row .badge-pass{background:#4caf50;color:#fff}
.test-row .badge-fail{background:#f44336;color:#fff}
.test-row .badge-skip{background:#ff9800;color:#000}
.test-row .test-desc{flex:1;padding-top:2px}
.test-row .test-desc .test-purpose{color:#aaa;font-size:0.85em;margin-top:3px;display:block}
.test-row .test-detail-toggle{background:none;border:none;color:#888;cursor:pointer;font-size:0.85em;padding:2px 8px;border-radius:4px;transition:color .2s;flex-shrink:0}
.test-row .test-detail-toggle:hover{color:#e0e0e0;background:#2a2a4e}
.test-detail{width:100%;margin-top:8px;margin-left:-14px;margin-right:-14px;padding:12px 14px;background:#0a0a1e;border-radius:0 0 6px 6px;overflow-x:auto;display:none}
.test-detail.open{display:block}
.fail-cmd{margin-bottom:8px}
.fail-cmd code{display:block;padding:8px;background:#12122a;border-radius:4px;font-family:'Consolas','Courier New',monospace;font-size:0.85em;color:#e0e0e0;word-break:break-all;white-space:pre-wrap;margin-top:4px}
.fail-diff{padding:10px;background:#12122a;border-radius:4px;font-family:'Consolas','Courier New',monospace;font-size:0.85em;color:#d0d0d0;overflow-x:auto;white-space:pre-wrap;line-height:1.5;margin-top:4px}
.test-row .detail-log{background:#0a0a1e;border:1px solid #1a1a3e;border-radius:6px;padding:12px;font-family:'Consolas','Courier New',monospace;font-size:0.82em;color:#c0c0c0;overflow-x:auto;white-space:pre-wrap;line-height:1.5;max-height:360px;overflow-y:auto;margin-top:6px}

footer{text-align:center;padding:20px;color:#555;font-size:0.85em}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>OHOS Toybox Test Report</h1>
    <div class="sub">Interactive Drill-Down Report — Paste test output below</div>
  </header>

  <div class="input-area">
    <textarea id="inputText" placeholder="将 run-board.sh 的输出粘贴到这里...&#10;&#10;例如:&#10;==========================================&#10;  OHOS Toybox 板端测试运行器&#10;==========================================&#10;主板连接正常&#10;&#10;===== 检查主板命令支持 =====&#10;  [OK] bunzip2&#10;  [OK] cut&#10;..."></textarea>
    <div class="btn-row">
      <button class="btn primary" onclick="parseAndRender()">生成报告</button>
      <button class="btn" onclick="clearAll()">清除</button>
      <button class="btn" onclick="loadSample()">加载示例</button>
    </div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid #2a2a4e">
      <label style="color:#888;font-size:0.85em">或加载已保存的日志文件 (.log):</label>
      <div style="display:flex;gap:10px;margin-top:8px;align-items:center">
        <input type="file" id="fileInput" accept=".log,.txt" style="color:#e0e0e0;font-size:0.85em">
        <button class="btn" onclick="loadReportFile()">加载</button>
      </div>
    </div>
  </div>

  <div id="output"></div>

  <footer>OHOS Toybox Test Report &mdash; Drill-Down Version</footer>
</div>

<script>
var reportData = null;

function escHtml(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function parseLog(text) {
    var lines = text.split('\n');
    var boardOk = [], boardNo = [];
    var sections = [], results = [], resSection = [], failCmd = [], failDiff = [];
    var curSidx = -1, curRidx = -1;
    var inBoard = false, inFail = false;

    for (var i = 0; i < lines.length; i++) {
        var line = lines[i];

        if (line.indexOf('检查主板命令支持') !== -1) {
            inBoard = true;
            continue;
        }

        if (inBoard) {
            var m = line.match(/^\s*\[OK\]\s+(.+)$/);
            if (m) { boardOk.push(m[1]); continue; }
            m = line.match(/^\s*\[--\]\s+(.+)$/);
            if (m) {
                var c = m[1].replace(' (不支持)', '');
                boardNo.push(c); continue;
            }
            if (line.trim() === '' || line.indexOf('=====') === 0) {
                inBoard = false;
                if (line.trim() === '') continue;
            } else {
                continue;
            }
        }

        if (line === '==========================================') {
            inFail = false;
            if (i + 1 < lines.length) {
                var nm = lines[i+1].match(/^\s*测试:\s+(.+)$/);
                if (nm) {
                    curSidx = sections.length;
                    sections.push(nm[1]);
                    i++;
                    continue;
                }
            }
            continue;
        }

        if (line.indexOf('PASS:') === 0) {
            inFail = false;
            curRidx = results.length;
            results.push({type:'PASS', desc:line.substring(5).trim()});
            resSection.push(curSidx);
            failCmd.push('');
            failDiff.push('');
            continue;
        }
        if (line.indexOf('SKIP:') === 0) {
            inFail = false;
            curRidx = results.length;
            results.push({type:'SKIP', desc:line.substring(5).trim()});
            resSection.push(curSidx);
            failCmd.push('');
            failDiff.push('');
            continue;
        }
        if (line.indexOf('FAIL:') === 0) {
            inFail = true;
            curRidx = results.length;
            results.push({type:'FAIL', desc:line.substring(5).trim()});
            resSection.push(curSidx);
            failCmd.push('');
            failDiff.push('');
            continue;
        }

        if (inFail && curRidx >= 0) {
            if (failCmd[curRidx] === '') {
                failCmd[curRidx] = line;
            } else {
                failDiff[curRidx] = (failDiff[curRidx] || '') + line + '\n';
            }
        }
    }

    var details = [];
    var inDetail = false, detailCmd = '', detailName = '', detailResult = '', detailText = '';
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        var dm = line.match(/^===== DETAIL: (.+?) =====$/);
        if (dm) {
            if (inDetail && detailName) {
                details.push({cmd: detailCmd, name: detailName, result: detailResult, text: detailText});
            }
            inDetail = true;
            detailCmd = dm[1];
            detailName = '';
            detailResult = '';
            detailText = '';
            continue;
        }
        if (inDetail) {
            var lm = line.match(/^\[(.+?)\]\s+(PASS|FAIL|SKIP)\s+(.+?)\s*\|/);
            if (lm) {
                if (detailName) {
                    details.push({cmd: detailCmd, name: detailName, result: detailResult, text: detailText});
                }
                detailResult = lm[2];
                detailName = lm[3];
                detailText = line + '\n';
            } else if (line.substring(0, 2) === '  ' || line === '') {
                detailText += line + '\n';
            } else {
                if (detailName) {
                    details.push({cmd: detailCmd, name: detailName, result: detailResult, text: detailText});
                }
                inDetail = false;
            }
        }
    }
    if (inDetail && detailName) {
        details.push({cmd: detailCmd, name: detailName, result: detailResult, text: detailText});
    }

    return { boardOk: boardOk, boardNo: boardNo, sections: sections,
             results: results, resSection: resSection,
             failCmd: failCmd, failDiff: failDiff, details: details };
}

function countResults(results) {
    var pass = 0, fail = 0, skip = 0;
    for (var i = 0; i < results.length; i++) {
        if (results[i].type === 'PASS') pass++;
        else if (results[i].type === 'FAIL') fail++;
        else if (results[i].type === 'SKIP') skip++;
    }
    return { pass: pass, fail: fail, skip: skip, total: pass+fail+skip };
}

function getCmdStats(sectionIdx, results, resSection) {
    var cmdResults = [];
    for (var ri = 0; ri < results.length; ri++) {
        if (resSection[ri] === sectionIdx) cmdResults.push(results[ri]);
    }
    return countResults(cmdResults);
}

function renderDashboard(data) {
    var stats = countResults(data.results);
    var total = stats.total;
    var pp = total > 0 ? Math.round(stats.pass * 100 / total) : 0;
    var fp = total > 0 ? Math.round(stats.fail * 100 / total) : 0;
    var sp = total > 0 ? Math.round(stats.skip * 100 / total) : 0;
    var statusText = stats.fail > 0 ? '失败数: ' + stats.fail : '全部通过!';
    var statusClass = stats.fail > 0 ? 'has-fail' : 'success';
    var h = '';

    // Summary
    h += '<div class="summary">';
    h += '<div class="summary-grid">';
    h += '<div class="summary-item total"><div class="num">' + total + '</div><div class="lbl">总计</div></div>';
    h += '<div class="summary-item pass"><div class="num">' + stats.pass + '</div><div class="lbl">通过</div></div>';
    h += '<div class="summary-item fail"><div class="num">' + stats.fail + '</div><div class="lbl">失败</div></div>';
    h += '<div class="summary-item skip"><div class="num">' + stats.skip + '</div><div class="lbl">跳过</div></div>';
    h += '</div>';
    if (total > 0) {
        h += '<div class="progress-bar">';
        if (pp > 0) h += '<div class="progress-segment progress-pass" style="width:' + pp + '%"></div>';
        if (fp > 0) h += '<div class="progress-segment progress-fail" style="width:' + fp + '%"></div>';
        if (sp > 0) h += '<div class="progress-segment progress-skip" style="width:' + sp + '%"></div>';
        h += '</div>';
    }
    h += '<div class="status-banner ' + statusClass + '">' + statusText + '</div>';
    h += '</div>';

    // Board support
    if (data.boardOk.length > 0 || data.boardNo.length > 0) {
        h += '<div class="section"><h2 class="section-title">主板命令支持</h2><ul class="board-list">';
        for (var bi = 0; bi < data.boardOk.length; bi++) {
            h += '<li class="ok"><span class="badge-ok">OK</span> ' + escHtml(data.boardOk[bi]) + '</li>';
        }
        for (var bi = 0; bi < data.boardNo.length; bi++) {
            h += '<li class="no"><span class="badge-no">--</span> ' + escHtml(data.boardNo[bi]) + '</li>';
        }
        h += '</ul></div>';
    }

    // Command grid
    h += '<div class="section"><h2 class="section-title">命令列表 <span style="color:#888;font-weight:400;font-size:0.85em">(' + data.sections.length + ' 个命令)</span></h2>';
    h += '<div class="command-grid">';
    for (var si = 0; si < data.sections.length; si++) {
        var cmdStats = getCmdStats(si, data.results, data.resSection);
        var cmdName = data.sections[si];
        h += '<div class="command-card" onclick="showCommand(' + si + ')" title="点击查看 ' + escHtml(cmdName) + ' 的测试详情">';
        h += '<div class="cmd-name">' + escHtml(cmdName) + '</div>';
        h += '<div class="cmd-stats">';
        h += '<span class="stat-badge total">' + cmdStats.total + ' 项</span>';
        if (cmdStats.pass > 0) h += '<span class="stat-badge pass">' + cmdStats.pass + ' PASS</span>';
        if (cmdStats.fail > 0) h += '<span class="stat-badge fail">' + cmdStats.fail + ' FAIL</span>';
        if (cmdStats.skip > 0) h += '<span class="stat-badge skip">' + cmdStats.skip + ' SKIP</span>';
        h += '</div>';
        h += '</div>';
    }
    h += '</div></div>';

    h += '<footer>Generated: ' + new Date().toLocaleString() + '</footer>';
    return h;
}

function renderCommandDetail(sectionIdx, data) {
    var cmdName = data.sections[sectionIdx];
    var cmdStats = getCmdStats(sectionIdx, data.results, data.resSection);
    var h = '';

    // Nav bar
    h += '<div class="nav-bar">';
    h += '<button class="back-btn" onclick="showDashboard()">&larr; 返回总览</button>';
    h += '<div class="breadcrumb"><span>测试总览</span><span class="sep">/</span><span>' + escHtml(cmdName) + '</span></div>';
    h += '</div>';

    // Command header
    h += '<div class="cmd-header">';
    h += '<div class="cmd-title">' + escHtml(cmdName) + '</div>';
    h += '<div class="cmd-name-monospace">命令测试详情</div>';
    h += '<div class="cmd-summary-stats">';
    h += '<span class="stat total" style="background:#1e1e4a;color:#aaa">总计: ' + cmdStats.total + '</span>';
    if (cmdStats.pass > 0) h += '<span class="stat pass">通过: ' + cmdStats.pass + '</span>';
    if (cmdStats.fail > 0) h += '<span class="stat fail">失败: ' + cmdStats.fail + '</span>';
    if (cmdStats.skip > 0) h += '<span class="stat skip">跳过: ' + cmdStats.skip + '</span>';
    h += '</div></div>';

    // Test cases
    h += '<h2 style="font-size:1em;color:#e8e8ff;margin-bottom:12px">测试用例 <button onclick="toggleAllDetail()" style="background:#2a2a4e;color:#aaa;border:1px solid #3a3a5e;border-radius:4px;padding:2px 10px;font-size:0.8em;cursor:pointer;margin-left:8px">全部展开/折叠</button></h2>';
    h += '<div class="test-list">';
    for (var ri = 0; ri < data.results.length; ri++) {
        if (data.resSection[ri] !== sectionIdx) continue;
        var r = data.results[ri];
        var rtypeLower = r.type.toLowerCase();
        h += '<div class="test-row ' + rtypeLower + '">';
        h += '<span class="badge badge-' + rtypeLower + '">' + r.type + '</span>';

        // Test description
        var testName = r.desc;
        var purpose = inferPurpose(cmdName, testName);
        h += '<div class="test-desc">';
        h += '<span class="test-purpose">' + escHtml(testName) + '</span>';
        if (purpose) {
            h += '<span class="test-purpose" style="color:#777;font-size:0.8em;margin-top:2px">' + escHtml(purpose) + '</span>';
        }
        h += '</div>';

        // Look up DETAIL data for this test
        var detailText = '';
        var allDetails = data.details || [];
        for (var di = 0; di < allDetails.length; di++) {
            if (allDetails[di].cmd === cmdName && allDetails[di].name === r.desc) {
                detailText = allDetails[di].text;
                break;
            }
        }

        if (detailText || (r.type === 'FAIL' && data.failCmd[ri])) {
            var detailId = 'detail-' + sectionIdx + '-' + ri;
            h += '<button class="test-detail-toggle" onclick="toggleDetail(\'' + detailId + '\')">详情</button>';
            h += '</div>';  // close test-row
            h += '<div id="' + detailId + '" class="test-detail">';
            if (detailText) {
                h += '<pre class="detail-log">' + escHtml(detailText) + '</pre>';
            } else if (r.type === 'FAIL' && data.failCmd[ri]) {
                h += '<div class="fail-cmd"><strong>命令:</strong><code>' + escHtml(data.failCmd[ri]) + '</code></div>';
                if (data.failDiff[ri]) {
                    h += '<pre class="fail-diff">' + escHtml(data.failDiff[ri]) + '</pre>';
                }
            }
            h += '</div>';
        } else {
            h += '</div>';  // close test-row
        }
    }
    h += '</div>';

    h += '<footer>Generated: ' + new Date().toLocaleString() + '</footer>';
    return h;
}

// Infer the purpose of a test from its description and command name
function inferPurpose(cmd, testDesc) {
    var known = {
        'help': '验证 --help 参数能正常输出用法说明',
        'no args': '验证无参数时输出错误信息并返回非零退出码',
        'bad flag': '验证无效参数被正确拒绝',
        'invalid': '验证无效输入被正确拒绝',
        'usage': '验证命令用法说明'
    };
    var lower = testDesc.toLowerCase();
    for (var key in known) {
        if (lower.indexOf(key) !== -1) return known[key];
    }
    var dashes = testDesc.match(/^(-[a-z]|--[a-z][a-z-]+)/);
    if (dashes) {
        return '测试 ' + escHtml(dashes[1]) + ' 参数功能';
    }
    return '';
}

// --- Navigation ---

function showDashboard() {
    if (!reportData) return;
    var output = document.getElementById('output');
    output.innerHTML = renderDashboard(reportData);
    output.style.display = 'block';
}

function showCommand(sectionIdx) {
    if (!reportData) return;
    var output = document.getElementById('output');
    output.innerHTML = renderCommandDetail(sectionIdx, reportData);
    output.style.display = 'block';
    window.scrollTo(0, 0);
}

function toggleDetail(id) {
    var el = document.getElementById(id);
    if (el) el.classList.toggle('open');
}

function toggleAllDetail() {
    var details = document.querySelectorAll('.test-detail');
    var anyClosed = false;
    for (var i = 0; i < details.length; i++) {
        if (!details[i].classList.contains('open')) { anyClosed = true; break; }
    }
    for (var i = 0; i < details.length; i++) {
        if (anyClosed) details[i].classList.add('open');
        else details[i].classList.remove('open');
    }
}

// --- Main entry ---

function parseAndRender() {
    var text = document.getElementById('inputText').value;
    var output = document.getElementById('output');

    if (!text.trim()) {
        output.style.display = 'block';
        output.innerHTML = '<div class="error-msg">错误: 请粘贴测试输出</div>';
        return;
    }

    reportData = parseLog(text);
    if (reportData.sections.length === 0 && reportData.boardOk.length === 0) {
        output.style.display = 'block';
        output.innerHTML = '<div class="error-msg">错误: 未能识别任何测试数据。请确认粘贴的是 run-board.sh 的输出。</div>';
        return;
    }

    showDashboard();
}

// --- Utilities ---

function loadReportFile() {
    var file = document.getElementById('fileInput').files[0];
    if (!file) { alert('请先选择日志文件'); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('inputText').value = e.target.result;
        parseAndRender();
    };
    reader.readAsText(file);
}

function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('output').style.display = 'none';
    reportData = null;
}
